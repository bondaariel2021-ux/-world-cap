<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 FIFA World Cup Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #040711; }
        .bg-worldcup-pattern {
            background-size: 60px 60px;
            background-image: radial-gradient(circle, rgba(234, 179, 8, 0.02) 1px, transparent 1px), radial-gradient(circle, rgba(13, 148, 136, 0.02) 1px, transparent 1px);
        }
    </style>
</head>
<body class="text-slate-200 antialiased min-h-screen bg-worldcup-pattern">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function calcPoints(match) {
          if (match.status !== 'FT' || match.homeScore === null || match.awayScore === null) return null;
          if (match.prediction.home === match.homeScore && match.prediction.away === match.awayScore) return 3;
          if (Math.sign(match.homeScore - match.awayScore) === Math.sign(match.prediction.home - match.prediction.away)) return 1;
          return 0;
        }

        function MatchCard({ match }) {
          const [open, setOpen] = useState(false);
          const points = calcPoints(match);
          const statusBadge = {
            NS: { label: 'טרם התחיל', cls: 'bg-slate-900 text-slate-400 border border-slate-800' },
            LIVE: { label: 'LIVE משודר', cls: 'bg-rose-500 text-white font-extrabold shadow-lg animate-pulse' },
            FT: { label: 'הסתיים', cls: 'bg-teal-950/40 text-teal-400 border border-teal-900/30 font-bold' },
          }[match.status];

          const pointsStyle = points === 3 ? 'text-yellow-400 bg-yellow-500/10 border border-yellow-500/30' : points === 1 ? 'text-teal-400 bg-teal-500/10 border border-teal-500/20' : 'text-slate-500 bg-slate-900/60 border border-slate-800';

          return (
            <div className={`rounded-2xl border transition-all duration-300 bg-slate-900/40 backdrop-blur-md overflow-hidden ${match.status === 'LIVE' ? 'border-rose-500/40' : 'border-slate-800/60 hover:border-teal-500/40'}`}>
              {match.status === 'LIVE' && match.broadcast && (
                <div className="bg-gradient-to-r from-rose-600 via-orange-500 to-yellow-500 text-slate-950 text-xs font-black px-4 py-1.5 flex items-center gap-1.5">
                  <span className="w-2 h-2 rounded-full bg-slate-950 animate-ping" />
                  <span>שידור ישיר כעת: <span className="underline font-black">{match.broadcast}</span></span>
                </div>
              )}
              <div className="p-5">
                <div className="flex items-center justify-between mb-4">
                  <span className="text-xs font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-yellow-400 bg-slate-950/80 border border-teal-950 px-2.5 py-0.5 rounded-full uppercase">{match.group}</span>
                  <span className={`text-[11px] uppercase tracking-wider px-2.5 py-1 rounded-full ${statusBadge.cls}`}>{statusBadge.label}</span>
                </div>
                <div className="flex items-center justify-between gap-3 my-4">
                  <div className="flex-1 text-center font-extrabold text-slate-100 text-sm sm:text-base">{match.home}</div>
                  <div className="flex flex-col items-center justify-center px-4 py-2 rounded-xl bg-slate-950 border border-slate-800/80 shadow-inner min-w-[95px]">
                    {match.status === 'NS' ? ( <span className="text-teal-400 font-black text-xs tracking-wider">VS</span> ) : (
                      <div className="flex items-center gap-2">
                        <span className="text-xl font-black text-white">{match.homeScore}</span>
                        <span className="text-slate-700 font-black">-</span>
                        <span className="text-xl font-black text-white">{match.awayScore}</span>
                      </div>
                    )}
                  </div>
                  <div className="flex-1 text-center font-extrabold text-slate-100 text-sm sm:text-base">{match.away}</div>
                </div>
                <div className="mt-2 pt-3.5 border-t border-slate-800/60 flex items-center justify-between text-xs sm:text-sm">
                  <div className="flex items-center gap-2 text-slate-400">
                    <span>ההימור שלך:</span>
                    <span className="bg-slate-950 text-yellow-400 border border-slate-800 px-2.5 py-0.5 rounded-lg font-mono font-black tracking-widest">{match.prediction.home} - {match.prediction.away}</span>
                  </div>
                  {points !== null && ( <span className={`flex items-center gap-1.5 font-black text-xs px-3 py-1 rounded-xl ${pointsStyle}`}>{points === 3 ? "🎯 בול! (+3)" : "💪 כיוון נכון (+1)"}</span> )}
                </div>
                {match.status === 'FT' && match.summary && (
                  <div className="mt-3 pt-2.5 border-t border-slate-800/40">
                    <button onClick={() => setOpen(!open)} className="text-xs font-bold text-teal-400 hover:text-teal-300">
                      {open ? 'הסתר תקציר' : 'הצג תקציר משחק רשמי'}
                    </button>
                    {open && <p className="mt-2 text-xs text-slate-300 bg-slate-950/60 p-4 rounded-xl">{match.summary}</p>}
                  </div>
                )}
              </div>
            </div>
          );
        }

        function App() {
          const [matches, setMatches] = useState([]);
          const [tab, setTab] = useState('dashboard');

          useEffect(() => {
            fetch('./data.json')
              .then(res => res.json())
              .then(data => setMatches(data))
              .catch(err => console.error(err));
          }, []);

          const { activeMatches, pastMatches } = useMemo(() => {
            return { activeMatches: matches.filter(m => m.status !== 'FT'), pastMatches: matches.filter(m => m.status === 'FT') };
          }, [matches]);

          const stats = useMemo(() => {
            let total = 0, exactCount = 0, outcomeCount = 0, played = 0;
            matches.forEach(m => {
              const p = calcPoints(m); if (p === null) return;
              played++; total += p;
              if (p === 3) exactCount++; else if (p === 1) outcomeCount++;
            });
            return { total, exactCount, outcomeCount, played };
          }, [matches]);

          return (
            <div className="min-h-screen">
              <header className="border-b border-slate-800/80 sticky top-0 bg-slate-950/80 backdrop-blur-xl z-50 p-4">
                <div className="max-w-2xl mx-auto flex items-center justify-between">
                  <div className="font-black text-sm tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-yellow-400">FIFA WORLD CUP LIVE</div>
                  <nav className="flex gap-1 bg-slate-900/90 p-1 rounded-xl border border-slate-800/60">
                    <button onClick={() => setTab('dashboard')} className={`px-4 py-1.5 rounded-lg text-xs font-black ${tab === 'dashboard' ? 'bg-gradient-to-r from-teal-500 to-teal-600 text-slate-950' : 'text-slate-400'}`}>משחקים</button>
                    <button onClick={() => setTab('stats')} className={`px-4 py-1.5 rounded-lg text-xs font-black ${tab === 'stats' ? 'bg-gradient-to-r from-teal-500 to-teal-600 text-slate-950' : 'text-slate-400'}`}>ניקוד</button>
                  </nav>
                </div>
              </header>
              <main className="max-w-2xl mx-auto px-4 py-8">
                {tab === 'dashboard' && (
                  <div className="space-y-6">
                    {activeMatches.length > 0 && ( <div className="grid gap-4">{activeMatches.map(m => <MatchCard key={m.id} match={m} />)}</div> )}
                    {pastMatches.length > 0 && ( <div className="grid gap-4">{pastMatches.map(m => <MatchCard key={m.id} match={m} />)}</div> )}
                  </div>
                )}
                {tab === 'stats' && (
                  <div className="grid grid-cols-2 gap-4">
                    <div className="rounded-2xl bg-slate-900 p-5 border border-slate-800">
                      <div className="text-xl font-black text-yellow-400">{stats.total}</div>
                      <div className="text-xs text-slate-400 font-bold">סה"כ נקודות</div>
                    </div>
                    <div className="rounded-2xl bg-slate-900 p-5 border border-slate-800">
                      <div className="text-xl font-black text-teal-400">{stats.exactCount}</div>
                      <div className="text-xs text-slate-400 font-bold">פגיעות בול</div>
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
